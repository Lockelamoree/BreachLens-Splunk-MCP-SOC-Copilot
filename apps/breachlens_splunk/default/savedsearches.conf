[BreachLens - Password Spray Detection]
search = `breachlens_index` sourcetype=breachlens:auth action=failure earliest=-24h | stats dc(user) as targeted_users count as attempts values(user) as users by src_ip | where targeted_users >= 5 AND attempts >= 8 | sort -attempts
description = Detects a source IP attempting failed logins against multiple users.
enableSched = 0
disabled = 0

[BreachLens - Impossible Travel Detection]
search = `breachlens_index` sourcetype=breachlens:auth action=success earliest=-24h | stats earliest(_time) as first_seen latest(_time) as last_seen values(country) as countries values(src_ip) as src_ips values(geo) as geos by user | eval country_count=mvcount(countries) | where country_count > 1 AND last_seen-first_seen < 3600
description = Flags successful authentications from multiple countries for a user inside one hour.
enableSched = 0
disabled = 0

[BreachLens - Cloud Token Abuse Detection]
search = `breachlens_index` sourcetype=breachlens:cloud earliest=-24h action IN ("CreateAccessKey","AssumeRole","CreateLoginProfile") | stats values(action) as actions values(resource) as resources values(src_ip) as src_ips count by user provider account_id | where count >= 2
description = Finds suspicious cloud credential or role activity after identity compromise.
enableSched = 0
disabled = 0

[BreachLens - Encoded PowerShell From Office]
search = `breachlens_index` sourcetype=breachlens:edr process=powershell.exe parent_process IN ("WINWORD.EXE","EXCEL.EXE","POWERPNT.EXE") command_line="*EncodedCommand*" | table _time host user parent_process process command_line sha256 severity
description = Detects encoded PowerShell spawned by Office applications.
enableSched = 0
disabled = 0

[BreachLens - Suspicious Exfil Upload]
search = `breachlens_index` sourcetype=breachlens:proxy category=file_sharing bytes_out>50000000 | stats sum(bytes_out) as total_bytes values(dest_domain) as domains values(url) as urls by host user src_ip | where total_bytes > 100000000 | sort -total_bytes
description = Detects large outbound file-sharing uploads from a workstation.
enableSched = 0
disabled = 0

